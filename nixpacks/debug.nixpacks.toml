# vim: set ft=toml:
# Debug build for ascii-chat (Nix-based)
# Based on the deps image produced by deps.nixpacks.toml.
# Mirrors docker/Dockerfile using Nixpacks.
#
# Requires: nixpacks build . --config nixpacks/deps.nixpacks.toml --name zfogg/ascii-chat-deps-nix:latest
# Build:    nixpacks build . --config nixpacks/debug.nixpacks.toml --name zfogg/ascii-chat-debug-nix:latest
#
# Run:      docker run --rm zfogg/ascii-chat-debug-nix:latest --help
# Server:   docker run --rm -p 27224:27224 zfogg/ascii-chat-debug-nix:latest server
# ACDS:     docker run --rm -p 27225:27225 zfogg/ascii-chat-debug-nix:latest discovery-service --port 27225

providers = []

# Use the deps image as the build base (all tools and .deps-cache/ pre-populated)
buildImage = "zfogg/ascii-chat-deps-nix:latest"

[variables]
CMAKE_GENERATOR = "Ninja"
DEBIAN_FRONTEND = "noninteractive"
VERSION = "0.0.0"
LIB_VERSION = "0.3.0"
SOURCE_COMMIT = "docker-build"
PATH = "/root/.nix-profile/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/bin"
PKG_CONFIG_PATH = "/root/.nix-profile/lib/pkgconfig:/root/.nix-profile/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig"
CMAKE_PREFIX_PATH = "/root/.nix-profile"
LD_LIBRARY_PATH = "/root/.nix-profile/lib"
LDFLAGS = "-L/root/.nix-profile/lib -L/lib -L/usr/lib"
CFLAGS = "-I/root/.nix-profile/include"
CPPFLAGS = "-I/root/.nix-profile/include"

[phases.setup]
cmds = [
  # Preserve submodules from deps image before COPY overwrites them
  "cp -a deps /tmp/deps-preserve || true",
]

[phases.restore]
dependsOn = ["setup"]
cmds = [
  # Restore submodules from deps image (overwrite empty dirs from build context)
  "rm -rf deps/ascii-chat-deps deps/doxygen-awesome-css",
  "cp -a /tmp/deps-preserve/* deps/ 2>/dev/null || true",
  "rm -rf /tmp/deps-preserve",
  # Nix splits compiler-rt into a separate store path, but clang expects it
  # under --print-resource-dir/lib/linux. Symlink the compiler-rt libs so
  # cmake's sanitizer detection finds them.
  "bash -c 'RESOURCE_DIR=$(clang --print-resource-dir) && COMPILER_RT_DIR=$(find /nix/store -maxdepth 1 -name \"*compiler-rt-libc*\" -type d | head -1) && if [ -n \"$COMPILER_RT_DIR\" ] && [ -d \"$COMPILER_RT_DIR/lib/linux\" ]; then mkdir -p \"$RESOURCE_DIR/lib/linux\" && ln -sf \"$COMPILER_RT_DIR/lib/linux/\"* \"$RESOURCE_DIR/lib/linux/\"; fi'",
  # Find and link CRT files and libgcc from nix store
  "bash -c 'mkdir -p /root/.nix-profile/lib && for pattern in \"Scrt1.o\" \"crti.o\" \"crtbeginS.o\" \"libgcc.so*\" \"libgcc_s.so*\"; do find /nix/store -name \"$pattern\" -type f 2>/dev/null | head -1 | xargs -r ln -sf -t /root/.nix-profile/lib/; done'",
  # Nix multi-output packages put .pc files in -dev store paths that aren't
  # symlinked into the profile. Collect all .pc files from nix store into
  # the profile's pkgconfig dir so cmake can find them.
  "bash -c 'mkdir -p /root/.nix-profile/lib/pkgconfig && find /nix/store -name \"*.pc\" -type f 2>/dev/null | while read pc; do ln -sf \"$pc\" /root/.nix-profile/lib/pkgconfig/ 2>/dev/null; done'",
  # Create opus.pc manually since libopus in nixpkgs doesn't provide it
  "bash -c 'mkdir -p /root/.nix-profile/lib/pkgconfig && echo \"prefix=/nix/store/rgfdkflfaj85c6h5qjgwq01f2kh46pha-libopus-1.6.1\" > /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"exec_prefix=\\${prefix}\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"libdir=\\${exec_prefix}/lib\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"includedir=\\${prefix}/include\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"Name: Opus\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"Description: Opus audio codec\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"Version: 1.6.1\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"Libs: -L\\${libdir} -lopus\" >> /root/.nix-profile/lib/pkgconfig/opus.pc && echo \"Cflags: -I\\${includedir}\" >> /root/.nix-profile/lib/pkgconfig/opus.pc'",
]

# Build ascii-chat Debug binary
[phases.build]
dependsOn = ["restore"]
cmds = [
  # Create minimal .git for cmake version detection
  "mkdir -p .git && touch .git/HEAD .git/index",
  # Build Debug (configure is fast because .deps-cache/ is pre-populated)
  # Use musl to avoid glibc CRT linking issues in nix containerized environment
  "make CMAKE_BUILD_TYPE=Debug EXTRA_CMAKE_ARGS='-DUSE_MUSL=ON -DASCIICHAT_ENABLE_ANALYZERS=OFF -DASCIICHAT_LIB_VERSION=${LIB_VERSION}'",
  # Install to /usr/local
  "make install CMAKE_BUILD_TYPE=Debug CMAKE_INSTALL_PREFIX=/usr/local",
]

[phases.runtime_setup]
dependsOn = ["build"]
cmds = [
  # Create ACDS directory for keys
  "mkdir -p /acds && chmod 755 /acds",
  # Create data directory for ACDS database (volume mount point)
  "mkdir -p /data",
  # Create non-root user for running ascii-chat
  "useradd -m -u 1001 -s /bin/bash ascii 2>/dev/null || true",
  "mkdir -p /home/ascii/.config /home/ascii/.local/share",
  "chown -R ascii:ascii /home/ascii 2>/dev/null || true",
  "chown -R ascii:ascii /acds 2>/dev/null || true",
  "chown -R ascii:ascii /data 2>/dev/null || true",
  # Copy entrypoint script
  "cp docker/docker-entrypoint.sh /usr/local/bin/docker-entrypoint.sh",
  "chmod +x /usr/local/bin/docker-entrypoint.sh",
]

[start]
cmd = "/usr/local/bin/docker-entrypoint.sh --help"
