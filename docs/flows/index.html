<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ascii-chat — Architecture & Flows</title>
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141417;
  --bg3: #1a1a1f;
  --border: #2a2a35;
  --border2: #3a3a48;
  --text: #e2e2e8;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #6366f1;
  --accent2: #818cf8;

  --col-options:   #6366f1;
  --col-media:     #10b981;
  --col-render:    #f59e0b;
  --col-network:   #3b82f6;
  --col-discovery: #8b5cf6;
  --col-session:   #ec4899;
  --col-wasm:      #06b6d4;
  --col-crypto:    #f43f5e;
  --col-audio:     #84cc16;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}
.header-logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
}
.header-logo span { color: var(--accent2); }
.header-subtitle {
  font-size: 11px;
  color: var(--text2);
  flex: 1;
}

/* ── Flow tabs ── */
.flow-tabs {
  display: flex;
  gap: 4px;
}
.flow-tab {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  transition: all 0.15s;
  white-space: nowrap;
}
.flow-tab:hover { color: var(--text2); border-color: var(--border2); }
.flow-tab.active { color: var(--text); background: var(--bg3); border-color: var(--border2); }

/* ── Legend ── */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  padding: 6px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text2);
  cursor: pointer;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Main layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Canvas / diagram area ── */
.diagram-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

#flow-svg {
  width: 100%;
  height: 100%;
  cursor: grab;
  user-select: none;
}
#flow-svg:active { cursor: grabbing; }

/* ── Right panel ── */
.panel {
  width: 310px;
  flex-shrink: 0;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.panel-subtitle {
  font-size: 10px;
  color: var(--text2);
  line-height: 1.5;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.panel-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  font-size: 11px;
  gap: 8px;
  text-align: center;
  padding: 20px;
}
.panel-empty .hint { font-size: 22px; }

/* ── File entries in panel ── */
.file-entry {
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  overflow: hidden;
}
.file-entry-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--bg);
  flex-shrink: 0;
}
.file-entry-header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px 8px;
}
.file-entry-path {
  font-size: 10px;
  color: var(--text2);
  word-break: break-all;
}
.file-entry-fn {
  font-size: 11px;
  color: var(--text);
  font-weight: 600;
  margin-top: 1px;
}
.file-entry-note {
  font-size: 10px;
  color: var(--text2);
  padding: 6px 12px 10px;
  border-top: 1px solid var(--border);
  line-height: 1.5;
  font-style: italic;
}

.stage-desc {
  font-size: 10px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 12px;
  padding: 10px 12px;
  background: var(--bg3);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}

.notes-section {
  margin-top: 16px;
}
.notes-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 8px;
}
.note-item {
  font-size: 10px;
  color: var(--text2);
  line-height: 1.5;
  padding: 6px 10px;
  background: var(--bg3);
  border-radius: 4px;
  margin-bottom: 4px;
  border-left: 2px solid var(--border2);
}

/* ── SVG nodes ── */
.node-box {
  cursor: pointer;
  transition: filter 0.15s;
}
.node-box:hover rect { filter: brightness(1.2); }
.node-box.active rect { stroke-width: 2; filter: brightness(1.3); }
.node-box.dimmed { opacity: 0.2; }
.node-box.highlighted { opacity: 1; }

.node-rect {
  rx: 6; ry: 6;
  fill-opacity: 0.12;
  stroke-width: 1;
}
.node-label {
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 600;
  fill: var(--text);
  pointer-events: none;
}
.node-sublabel {
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 8.5px;
  fill: var(--text2);
  pointer-events: none;
}

.edge-path {
  fill: none;
  stroke-width: 1.5;
  opacity: 0.35;
  marker-end: url(#arrowhead);
  transition: opacity 0.15s;
}
.edge-path.active { opacity: 1; stroke-width: 2; }
.edge-path.dimmed { opacity: 0.05; }

.edge-label {
  font-family: 'SF Mono', ui-monospace, monospace;
  font-size: 9px;
  fill: var(--text3);
  pointer-events: none;
}
.edge-label.active { fill: var(--text2); }

/* ── Zoom controls ── */
.zoom-controls {
  position: absolute;
  bottom: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zoom-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.zoom-btn:hover { background: var(--bg3); }

/* ── Flow summary bar ── */
.flow-summary {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 10px;
  color: var(--text2);
  max-width: 300px;
  line-height: 1.5;
  z-index: 10;
}
.flow-summary strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 11px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">ascii<span>-chat</span></div>
  <div class="header-subtitle">Architecture &amp; Flows — pick a flow on the right to highlight the path through the system</div>
  <div class="flow-tabs" id="flow-tabs"></div>
</div>

<div class="legend" id="legend"></div>

<div class="main">
  <div class="diagram-area">
    <svg id="flow-svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="currentColor" opacity="0.6"/>
        </marker>
        <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#e2e2e8" opacity="1"/>
        </marker>
      </defs>
      <g id="diagram-root"></g>
    </svg>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.25)">+</button>
      <button class="zoom-btn" onclick="zoom(0.8)">−</button>
      <button class="zoom-btn" onclick="resetView()" title="Reset">⌖</button>
    </div>
    <div class="flow-summary" id="flow-summary"></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">Select a node</div>
      <div class="panel-subtitle" id="panel-subtitle">Click any node in the diagram to see the relevant source files and functions.</div>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="panel-empty">
        <div class="hint">👆</div>
        <div>Click a node in the diagram to explore its source files, functions, and implementation notes.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────────────────

const COLORS = {
  options:   '#6366f1',
  media:     '#10b981',
  render:    '#f59e0b',
  network:   '#3b82f6',
  discovery: '#8b5cf6',
  session:   '#ec4899',
  crypto:    '#f43f5e',
  audio:     '#84cc16',
  core:      '#9090a8',
};

const LEGEND_ITEMS = [
  { key: 'options',   label: 'Options / Config' },
  { key: 'media',     label: 'Media / Video' },
  { key: 'render',    label: 'Render / Encoder' },
  { key: 'network',   label: 'Network / ACIP' },
  { key: 'crypto',    label: 'Crypto / Auth' },
  { key: 'discovery', label: 'Discovery / ACDS' },
  { key: 'session',   label: 'Session / Lifecycle' },
  { key: 'audio',     label: 'Audio' },
];

// ── Flow definitions ───────────────────────────────────────
// Each flow has nodes and edges. Nodes have x,y,w,h,color,label,sublabel,files,description.

const FLOWS = {

  // ── OPTIONS FLOW ────────────────────────────────────────
  options: {
    id: 'options',
    title: '⚙️ Options & RCU',
    summary: {
      title: 'Options Parsing & RCU Publishing',
      text: 'How a CLI flag or WASM call becomes a live option. Five stages: mode detect → registry → parse → validate → atomic publish.'
    },
    nodes: [
      { id: 'argv', x:40, y:220, w:120, h:52, color:'core', label:'argv / WASM', sublabel:'Entry point',
        description: 'Command-line arguments (argc/argv) on native, or exported C bindings called from JS on WASM.',
        files: [
          { path:'src/main.c', fn:'main()', note:'Receives argc/argv, calls options_init() at line 733' },
          { path:'lib/platform/wasm/', fn:'wasm_set_option()', note:'WASM JS→C bridge for setting options programmatically' },
        ]},
      { id: 'mode_detect', x:220, y:170, w:140, h:52, color:'options', label:'Mode Detection', sublabel:'+ binary-level flags',
        description: 'Scans argv for mode keywords (server/client/mirror/discovery-service) or a session string. Parses binary-level flags: --log-file, --verbose, --quiet, --config before mode is known.',
        files: [
          { path:'lib/options/options.c', fn:'detect_mode_and_parse_binary_options()', note:'Determines mode before builder runs; sets opts.detected_mode' },
          { path:'lib/options/strings.c', fn:'asciichat_mode_from_string()', note:'Maps "server" → MODE_SERVER, etc.' },
          { path:'lib/discovery/strings.c', fn:'is_session_string()', note:'Detects "blue-mountain-tiger" style session strings → MODE_DISCOVERY' },
        ]},
      { id: 'registry', x:220, y:300, w:140, h:52, color:'options', label:'Registry', sublabel:'g_options_registry[]',
        description: 'A flat array of up to 2048 registry_entry_t descriptors, one per option. Each entry stores: long_name, short_name, type, byte offset in options_t, env_var_name, range [min,max], and optional parse_fn / validate_fn.',
        files: [
          { path:'lib/options/registry/core.c', fn:'registry_init_from_builders()', note:'Merges category arrays (audio, display, network, security…) into g_options_registry[]' },
          { path:'lib/options/registry/general.c', fn:'g_general_options[]', note:'Core options: port, address, fps, width, height' },
          { path:'lib/options/registry/display.c', fn:'g_display_options[]', note:'color-mode, palette, render-mode, color-filter' },
          { path:'lib/options/registry/security.c', fn:'g_security_options[]', note:'--password, --key, --server-key, --client-keys' },
          { path:'lib/options/registry/audio.c', fn:'g_audio_options[]', note:'microphone-index, speakers-volume, encode-audio…' },
        ]},
      { id: 'preset', x:430, y:190, w:130, h:52, color:'options', label:'Mode Preset', sublabel:'options_preset_unified()',
        description: 'Returns a preset_config_t for the detected mode. Each preset lists which option groups are active, default overrides (e.g. server defaults max-clients=8), and which flags are mutually exclusive.',
        files: [
          { path:'lib/options/config/presets.c', fn:'options_preset_unified()', note:'Single preset function covering all modes via mode_bitmask filtering' },
          { path:'lib/options/registry/mode_defaults.c', fn:'apply_mode_defaults()', note:'Sets mode-specific defaults: e.g. discovery-service-port=27225 for ACDS' },
        ]},
      { id: 'parse', x:430, y:310, w:130, h:52, color:'options', label:'Arg Parsing', sublabel:'builder + parsers',
        description: 'The option builder walks argv. For each --flag it looks up the registry entry and calls the typed parser. Custom parsers handle: timestamps, port ranges, palette strings, PCRE2 grep patterns, TOML config merge.',
        files: [
          { path:'lib/options/builder/builder.c', fn:'options_build()', note:'Core argv walking loop; dispatches to typed parsers' },
          { path:'lib/options/parsing/parsers.c', fn:'parse_setting() / parse_enum()', note:'PCRE2-validated setting strings: "auto"/"true"/"1"/"on"' },
          { path:'lib/options/parsing/parsers.c', fn:'parse_grep_pattern()', note:'Parses /pattern/flags syntax for --grep' },
          { path:'lib/options/config/config.c', fn:'options_config_parse_toml()', note:'Loads and merges TOML config file when --config is given' },
        ]},
      { id: 'env', x:620, y:250, w:130, h:52, color:'options', label:'Env Vars', sublabel:'ASCII_CHAT_*',
        description: 'After CLI parse, each registry entry\'s env_var_name is checked. Env vars override config-file values but yield to explicit CLI flags. ASCII_CHAT_QUESTION_PROMPT_RESPONSE pre-answers interactive prompts from a semicolon-separated stack.',
        files: [
          { path:'lib/options/parsing/parsers.c', fn:'apply_env_var_overrides()', note:'Iterates registry, applies env vars with lower priority than CLI' },
          { path:'lib/options/parsing/validation.c', fn:'options_validate()', note:'Cross-field validation: checks conflicting flags, enforces ranges' },
        ]},
      { id: 'rcu', x:620, y:360, w:130, h:52, color:'options', label:'RCU Publish', sublabel:'atomic_ptr_store()',
        description: 'options_state_init() allocates an options_t on the heap and stores a pointer in a global atomic_ptr_t (g_options). options_state_set() memcpy\'s the parsed struct in. Reader threads call options_get() / GET_OPTION() — a single lock-free atomic_ptr_load with no mutexes. Runtime updates do full copy-on-write.',
        files: [
          { path:'lib/options/rcu.c', fn:'options_state_init()', note:'Allocates initial options_t, publishes to g_options via atomic store' },
          { path:'lib/options/rcu.c', fn:'options_get()', note:'Lock-free atomic_ptr_load; falls back to static g_default_options if NULL' },
          { path:'lib/options/rcu.c', fn:'options_update()', note:'Copy-on-write writer: allocate → memcpy → updater → swap → deferred-free old' },
          { path:'include/ascii-chat/options/rcu.h', fn:'GET_OPTION(field)', note:'Macro: options_get()->field — used everywhere in the codebase' },
        ]},
      { id: 'consumer', x:820, y:300, w:130, h:52, color:'session', label:'Any Thread', sublabel:'GET_OPTION(fps)',
        description: 'After options_init() returns, any thread — render loop, audio thread, network thread — calls GET_OPTION(field_name) to read the current value. No lock taken. If options are dynamically updated (e.g. live FPS change), threads see the new value on their next call.',
        files: [
          { path:'lib/video/ascii/ascii.c', fn:'ascii_convert()', note:'Reads GET_OPTION(color_mode), GET_OPTION(palette_type)' },
          { path:'lib/audio/audio.c', fn:'audio_start()', note:'Reads GET_OPTION(audio_enabled), GET_OPTION(speakers_volume)' },
          { path:'lib/network/acip/server.c', fn:'acip_server_loop()', note:'Reads GET_OPTION(max_clients), GET_OPTION(port)' },
        ]},
    ],
    edges: [
      { from:'argv', to:'mode_detect', label:'1', color:'core' },
      { from:'argv', to:'registry', label:'', color:'core' },
      { from:'mode_detect', to:'preset', label:'2', color:'options' },
      { from:'registry', to:'preset', label:'', color:'options' },
      { from:'registry', to:'parse', label:'', color:'options' },
      { from:'preset', to:'parse', label:'3', color:'options' },
      { from:'parse', to:'env', label:'4', color:'options' },
      { from:'env', to:'rcu', label:'5', color:'options' },
      { from:'rcu', to:'consumer', label:'6', color:'session' },
    ],
  },

  // ── MEDIA PIPELINE ───────────────────────────────────────
  media: {
    id: 'media',
    title: '🎥 Media Pipeline',
    summary: {
      title: 'Input → ASCII → Terminal',
      text: 'Webcam / file / URL / stdin → RGBA decode → SIMD ASCII convert → ANSI terminal write.'
    },
    nodes: [
      { id: 'input_webcam', x:40, y:80, w:120, h:48, color:'media', label:'Webcam', sublabel:'V4L2 / AVFoundation',
        description: 'Live webcam capture. V4L2 on Linux, AVFoundation on macOS. Frame captured as YUV, converted to RGBA via SwsContext.',
        files: [
          { path:'lib/video/webcam/webcam.c', fn:'webcam_capture_frame()', note:'V4L2 ioctl VIDIOC_DQBUF → YUV → RGBA' },
          { path:'lib/video/webcam/webcam.c', fn:'webcam_init()', note:'Opens /dev/videoN, sets format, requests buffers' },
        ]},
      { id: 'input_file', x:40, y:165, w:120, h:48, color:'media', label:'File / URL', sublabel:'--file / --url',
        description: 'Local files (.mp4/.mkv/gif/…) or HTTP/HTTPS/RTSP streams opened directly by FFmpeg. Smart resolver: tries FFmpeg-native extension first, then yt-dlp subprocess for YouTube/Twitch/etc.',
        files: [
          { path:'lib/media/source.c', fn:'url_has_ffmpeg_native_extension()', note:'Checks .mp4/.mkv/.m3u8/rtsp:// etc. for direct FFmpeg open' },
          { path:'lib/media/yt_dlp.c', fn:'yt_dlp_extract_url()', note:'Spawns yt-dlp subprocess, caches result 30s in memory' },
          { path:'lib/media/ffmpeg_decoder.c', fn:'ffmpeg_decoder_create()', note:'Opens AVFormatContext, finds video/audio streams' },
        ]},
      { id: 'input_stdin', x:40, y:250, w:120, h:48, color:'media', label:'Stdin Pipe', sublabel:'--file \'-\'',
        description: 'FFmpeg reads from stdin via a custom AVIO context with a 64 KB ring buffer. Enables: ffmpeg -i input.mp4 -f rawvideo - | ascii-chat mirror --file \'-\'',
        files: [
          { path:'lib/media/ffmpeg_decoder.c', fn:'avio_alloc_context()', note:'64 KB AVIO buffer reading from fd 0 (stdin)' },
        ]},
      { id: 'input_test', x:40, y:335, w:120, h:48, color:'media', label:'Test Pattern', sublabel:'--test-pattern',
        description: 'Synthetic 320×240 RGBA frames generated in memory. Animated color sweep pattern for debugging rendering without a real camera.',
        files: [
          { path:'lib/media/source.c', fn:'media_source_generate_test_frame()', note:'Reuses a pre-allocated image_t, updates animation phase counter' },
        ]},
      { id: 'source', x:230, y:200, w:130, h:52, color:'media', label:'media_source_t', sublabel:'Unified abstraction',
        description: 'A polymorphic struct with type tag (WEBCAM/FILE/STDIN/TEST) and function-pointer-like dispatch. Hides all input details from the render loop. Supports: pause, seek, loop, audio co-decode.',
        files: [
          { path:'lib/media/source.c', fn:'media_source_create()', note:'Factory: examines options, creates correct backend' },
          { path:'lib/media/source.c', fn:'media_source_read_video_frame()', note:'Returns image_t* regardless of source type' },
          { path:'lib/media/source.c', fn:'media_source_read_audio()', note:'Returns PCM float samples for the audio thread' },
        ]},
      { id: 'colorfilter', x:420, y:120, w:130, h:52, color:'media', label:'Color Filter', sublabel:'RGBA pixel ops',
        description: 'Optional per-pixel RGBA transforms applied before ASCII conversion. Filters: GRAYSCALE, SEPIA, INVERT, HIGH_CONTRAST, COOL, WARM, MATRIX_GREEN, NIGHT_VISION, CRT. Matrix rain overlay is applied here.',
        files: [
          { path:'lib/video/rgba/color_filter.c', fn:'color_filter_apply()', note:'In-place pixel transform on image_t RGBA buffer' },
          { path:'lib/video/anim/digital_rain.c', fn:'digital_rain_update()', note:'Overlays falling katakana column animation (--matrix)' },
        ]},
      { id: 'ascii_conv', x:420, y:250, w:130, h:52, color:'media', label:'ASCII Convert', sublabel:'SIMD dispatcher',
        description: 'ascii_convert() maps pixel blocks to characters via luminance palette. Runtime SIMD dispatch: AVX2 → SSSE3 → SSE2 on x86, NEON/SVE on ARM, scalar fallback. For color: each cell gets ANSI SGR escapes. Halfblock mode (▀▄) encodes 2 vertical pixels per character.',
        files: [
          { path:'lib/video/ascii/ascii.c', fn:'ascii_convert()', note:'Main entry: luminance mapping + SIMD dispatch' },

// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let currentFlow = 'options';
let selectedNode = null;
let transform = { x: 0, y: 0, scale: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };

// ─────────────────────────────────────────────────────────
// Build Legend
// ─────────────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = LEGEND_ITEMS.map(item => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${COLORS[item.key]}"></div>
      ${item.label}
    </div>
  `).join('');
}

// ─────────────────────────────────────────────────────────
// Build Tabs
// ─────────────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('flow-tabs');
  el.innerHTML = Object.values(FLOWS).map(f => `
    <button class="flow-tab ${f.id === currentFlow ? 'active' : ''}"
            onclick="switchFlow('${f.id}')">${f.title}</button>
  `).join('');
}

// ─────────────────────────────────────────────────────────
// Switch Flow
// ─────────────────────────────────────────────────────────
function switchFlow(id) {
  currentFlow = id;
  selectedNode = null;
  buildTabs();
  renderFlow();
  resetView();
  clearPanel();
}

// ─────────────────────────────────────────────────────────
// Render Flow SVG
// ─────────────────────────────────────────────────────────
function renderFlow() {
  const flow = FLOWS[currentFlow];
  const root = document.getElementById('diagram-root');
  root.innerHTML = '';

  // Update summary
  const sum = document.getElementById('flow-summary');
  sum.innerHTML = `<strong>${flow.summary.title}</strong>${flow.summary.text}`;

  // Apply transform
  root.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.scale})`);

  // Build node lookup
  const nodeMap = {};
  flow.nodes.forEach(n => { nodeMap[n.id] = n; });

  // Draw edges first (behind nodes)
  const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeGroup.id = 'edges';
  root.appendChild(edgeGroup);

  flow.edges.forEach((edge, i) => {
    const from = nodeMap[edge.from];
    const to = nodeMap[edge.to];
    if (!from || !to) return;

    const x1 = from.x + from.w;
    const y1 = from.y + from.h / 2;
    const x2 = to.x;
    const y2 = to.y + to.h / 2;

    // Bezier curve
    const cx1 = x1 + (x2 - x1) * 0.45;
    const cy1 = y1;
    const cx2 = x1 + (x2 - x1) * 0.55;
    const cy2 = y2;

    const color = COLORS[edge.color] || COLORS.core;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
    path.setAttribute('class', 'edge-path');
    path.setAttribute('stroke', color);
    path.dataset.from = edge.from;
    path.dataset.to = edge.to;
    edgeGroup.appendChild(path);

    // Edge label
    if (edge.label) {
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2 - 6;
      const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', mx);
      lbl.setAttribute('y', my);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('class', 'edge-label');
      lbl.dataset.from = edge.from;
      lbl.dataset.to = edge.to;
      lbl.textContent = edge.label;
      edgeGroup.appendChild(lbl);
    }
  });

  // Draw nodes
  const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeGroup.id = 'nodes';
  root.appendChild(nodeGroup);

  flow.nodes.forEach(node => {
    const color = COLORS[node.color] || COLORS.core;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-box');
    g.setAttribute('transform', `translate(${node.x},${node.y})`);
    g.dataset.id = node.id;

    // Background rect
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', node.w);
    rect.setAttribute('height', node.h);
    rect.setAttribute('rx', 6);
    rect.setAttribute('ry', 6);
    rect.setAttribute('fill', color);
    rect.setAttribute('fill-opacity', '0.12');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', '1');
    g.appendChild(rect);

    // Label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', node.w / 2);
    lbl.setAttribute('y', node.sublabel ? 18 : node.h / 2 + 4);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('class', 'node-label');
    lbl.setAttribute('fill', color);
    lbl.textContent = node.label;
    g.appendChild(lbl);

    if (node.sublabel) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', node.w / 2);
      sub.setAttribute('y', 34);
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('class', 'node-sublabel');
      sub.textContent = node.sublabel;
      g.appendChild(sub);
    }

    g.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(node.id);
    });

    nodeGroup.appendChild(g);
  });
}

// ─────────────────────────────────────────────────────────
// Select Node
// ─────────────────────────────────────────────────────────
function selectNode(nodeId) {
  selectedNode = nodeId;
  const flow = FLOWS[currentFlow];

  // Find connected nodes
  const connected = new Set([nodeId]);
  flow.edges.forEach(e => {
    if (e.from === nodeId || e.to === nodeId) {
      connected.add(e.from);
      connected.add(e.to);
    }
  });

  // Update node classes
  document.querySelectorAll('.node-box').forEach(el => {
    el.classList.remove('active', 'dimmed', 'highlighted');
    if (el.dataset.id === nodeId) el.classList.add('active');
    else if (connected.has(el.dataset.id)) el.classList.add('highlighted');
    else el.classList.add('dimmed');
  });

  // Update edge classes
  document.querySelectorAll('.edge-path').forEach(el => {
    el.classList.remove('active', 'dimmed');
    if (el.dataset.from === nodeId || el.dataset.to === nodeId) el.classList.add('active');
    else el.classList.add('dimmed');
  });
  document.querySelectorAll('.edge-label').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.from === nodeId || el.dataset.to === nodeId) el.classList.add('active');
  });

  // Update panel
  const node = flow.nodes.find(n => n.id === nodeId);
  if (node) showPanel(node);
}

// ─────────────────────────────────────────────────────────
// Panel
// ─────────────────────────────────────────────────────────
function showPanel(node) {
  const color = COLORS[node.color] || COLORS.core;
  document.getElementById('panel-title').textContent = node.label;
  document.getElementById('panel-subtitle').textContent = node.sublabel || '';

  let html = '';

  if (node.description) {
    html += `<div class="stage-desc">${node.description.replace(/\n/g, '<br>')}</div>`;
  }

  node.files.forEach((f, i) => {
    html += `
      <div class="file-entry">
        <div class="file-entry-header">
          <div class="file-entry-num" style="background:${color}">${i + 1}</div>
          <div>
            <div class="file-entry-path">${f.path}</div>
            <div class="file-entry-fn">${f.fn}</div>
          </div>
        </div>
        ${f.note ? `<div class="file-entry-note">${f.note}</div>` : ''}
      </div>
    `;
  });

  if (node.files.length === 0) {
    html += `<div class="note-item" style="border-color:${color}33">No source files to show for this node.</div>`;
  }

  document.getElementById('panel-body').innerHTML = html;
}

function clearPanel() {
  document.getElementById('panel-title').textContent = 'Select a node';
  document.getElementById('panel-subtitle').textContent = 'Click any node in the diagram to see the relevant source files and functions.';
  document.getElementById('panel-body').innerHTML = `
    <div class="panel-empty">
      <div class="hint">👆</div>
      <div>Click a node in the diagram to explore its source files, functions, and implementation notes.</div>
    </div>`;
  document.querySelectorAll('.node-box').forEach(el => el.classList.remove('active','dimmed','highlighted'));
  document.querySelectorAll('.edge-path').forEach(el => el.classList.remove('active','dimmed'));
  document.querySelectorAll('.edge-label').forEach(el => el.classList.remove('active'));
}

// ─────────────────────────────────────────────────────────
// Pan & Zoom
// ─────────────────────────────────────────────────────────
function applyTransform() {
  const root = document.getElementById('diagram-root');
  root.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.scale})`);
}

function zoom(factor) {
  const svg = document.getElementById('flow-svg');
  const rect = svg.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  transform.x = cx + (transform.x - cx) * factor;
  transform.y = cy + (transform.y - cy) * factor;
  transform.scale *= factor;
  applyTransform();
}

function resetView() {
  const svg = document.getElementById('flow-svg');
  const rect = svg.getBoundingClientRect();
  transform = { x: rect.width * 0.04, y: rect.height * 0.08, scale: 0.95 };
  applyTransform();
}

// SVG drag to pan
const svg = document.getElementById('flow-svg');
svg.addEventListener('mousedown', e => {
  if (e.target.closest('.node-box')) return;
  dragging = true;
  dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = e.clientX - dragStart.x;
  transform.y = e.clientY - dragStart.y;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx + (transform.x - mx) * factor;
  transform.y = my + (transform.y - my) * factor;
  transform.scale *= factor;
  applyTransform();
}, { passive: false });

// Click background to deselect
svg.addEventListener('click', () => {
  selectedNode = null;
  clearPanel();
});

// ─────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────
buildLegend();
buildTabs();
renderFlow();
// Set initial transform after first render
requestAnimationFrame(() => resetView());
</script>
</body>
