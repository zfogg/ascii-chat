services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
        VITE_DISCOVERY_API_BASE: ${VITE_DISCOVERY_API_BASE:-http://localhost:3001}
        SSH_PUBLIC_KEY: ${SSH_PUBLIC_KEY}
        GPG_PUBLIC_KEY: ${GPG_PUBLIC_KEY}
        NODE_ENV: ${NODE_ENV:-development}
    image: zfogg/ascii-chat-web:latest
    container_name: ascii-chat-web
    ports:
      - "8088:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 1.5s
      retries: 3
      start_period: 3s
