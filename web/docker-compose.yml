services:
  discovery:
    build:
      context: ..
      dockerfile: web/discovery/Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    image: zfogg/ascii-chat-web-discovery:latest
    environment:
      - API_PORT=3001
    container_name: ascii-chat-discovery
    ports:
      - "5174:80"
    networks:
      ascii-chat:
        aliases:
          - discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 3s

  web:
    build:
      context: ..
      dockerfile: web/web/Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    image: zfogg/ascii-chat-web-web:latest
    environment:
      - API_PORT=3001
    container_name: ascii-chat-web
    ports:
      - "3000:80"
    networks:
      ascii-chat:
        aliases:
          - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 3s

  www:
    build:
      context: ..
      dockerfile: web/www/Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    image: zfogg/ascii-chat-web-www:latest
    environment:
      - API_PORT=3001
    container_name: ascii-chat-www
    ports:
      - "5173:80"
    networks:
      ascii-chat:
        aliases:
          - www
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 3s

volumes:
  node_modules:

networks:
  ascii-chat:
    driver: bridge
