services:
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    ports:
      - "5174:3000"
    environment:
      - API_PORT=3001
    container_name: ascii-chat-discovery

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_PORT=3001
    container_name: ascii-chat-web

  www:
    build:
      context: .
      dockerfile: www/Dockerfile
    ports:
      - "5173:5173"
      - "30001:30001"
    environment:
      - API_PORT=30001
    container_name: ascii-chat-www

volumes:
  node_modules:
