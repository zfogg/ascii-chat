[phases.setup]
nixPackages = ["nodejs_24", "pnpm"]

[build]
cmd = "pnpm build"

[[build.env]]
name = "SSH_PUBLIC_KEY"
value = ""

[[build.env]]
name = "GPG_PUBLIC_KEY"
value = ""

[[build.env]]
name = "VITE_DISCOVERY_API_BASE"
value = "https://discovery.ascii-chat.com"

[start]
cmd = "echo 'Static site build complete'"
